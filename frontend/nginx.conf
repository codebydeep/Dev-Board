server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # API proxy — must be declared before the SPA catch-all
  location ~ ^/(auth|projects|tasks) {
    proxy_pass http://api-gateway:8080;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA catch-all — serves index.html for all non-file routes
  location / {
    try_files $uri $uri/ /index.html =404;
  }
}
