services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: devboard
      MYSQL_USER: devboard
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "127.0.0.1:3307:3306"   # mapped to 3307 to avoid conflict with any local MySQL
    volumes:
      - mysql_data:/var/lib/mysql
      # Runs *.sql files once on first container creation
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=devboard-root"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports: ["6379:6379"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  auth-service:
    build:
      context: ./backend
      dockerfile: auth-service/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devboard
      DB_USER: devboard
      DB_PASSWORD: ${MYSQL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 384m
  project-service:
    build:
      context: ./backend
      dockerfile: project-service/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devboard
      DB_USER: devboard
      DB_PASSWORD: ${MYSQL_PASSWORD}
      AUTH_URL: http://auth-service:8081
      TASK_URL: http://task-service:8083
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 384m
  task-service:
    build:
      context: ./backend
      dockerfile: task-service/Dockerfile
    environment:
      DB_URL: jdbc:mysql://mysql:3306/devboard
      DB_USER: devboard
      DB_PASSWORD: ${MYSQL_PASSWORD}
      AUTH_URL: http://auth-service:8081
      PROJECT_URL: http://project-service:8082
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 384m
  api-gateway:
    build:
      context: ./backend
      dockerfile: api-gateway/Dockerfile
    environment:
      AUTH_URL: http://auth-service:8081
      PROJECT_URL: http://project-service:8082
      TASK_URL: http://task-service:8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports: ["8080:8080"]
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      project-service:
        condition: service_started
      task-service:
        condition: service_started
    restart: unless-stopped
    mem_limit: 384m
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api-gateway]
    restart: unless-stopped

volumes:
  mysql_data:
